    cur = Math.max(0, Math.min(slides.length-1, i));
    slides.forEach((el,k)=>el.classList.toggle('active', k===cur));
    hud.textContent = `${cur+1} / ${slides.length}  ·  slide ${SLIDES[cur].n}  ·  nhịp ${SLIDES[cur].nhip}`;
    bar.style.width = ((cur+1)/slides.length*100)+'%';
    paintMeta();
  }
  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){show(cur+1);e.preventDefault();}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(cur-1);}
    else if(e.key==='Home'){show(0);} else if(e.key==='End'){show(slides.length-1);}
    else if(e.key==='m'||e.key==='M'){metaEl.classList.toggle('show');}
    else if(e.key==='f'||e.key==='F'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();}
  });
  deck.addEventListener('click', e=>{ if(e.clientX < innerWidth*0.3) show(cur-1); else show(cur+1); });
  show(0);
  </script>
</body>
</html>
